name: zenith
description: Zenith Daily Task & Goal Planner mobile client.
version: 2.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  flutter_dotenv: ^5.1.0
  google_sign_in: ^6.2.1
  url_launcher: ^6.2.5
  flutter_local_notifications: ^17.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
